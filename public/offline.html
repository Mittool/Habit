<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trac - Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #f5f0eb;
      color: #2c2c2c;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 360px;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: #e8f0e8;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .icon svg { width: 32px; height: 32px; stroke: #5c7a5c; fill: none; stroke-width: 1.5; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: #6b6b6b; line-height: 1.6; margin-bottom: 20px; }
    button {
      background: #5c7a5c;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 24px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1>You are offline</h1>
    <p>Trac needs an internet connection for some features. Your cached data is still available.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
